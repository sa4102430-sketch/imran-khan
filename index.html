<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imran Khan - Home</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #092c15 0%, #1a0305 100%);
            color: #f8fafc;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background-color: #061a0c;
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-bottom: 2px solid #dc2626;
        }
        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            letter-spacing: 1px;
        }

        /* Beautiful Custom Translate Selector Styling */
        .custom-translate select {
            background-color: #0f172a;
            color: #facc15;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            font-weight: bold;
            transition: border-color 0.3s;
        }
        .custom-translate select:focus {
            border-color: #facc15;
        }

        /* Seamless Continuous Glowing Heartbeat Ticker Bar Styling */
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); } /* Perfectly loops at 50% */
        }
        @keyframes heartbeat {
            0%, 100% { box-shadow: 0 0 5px rgba(22, 163, 74, 0.3), 0 0 5px rgba(220, 38, 38, 0.3); }
            50% { box-shadow: 0 0 15px rgba(22, 163, 74, 0.6), 0 0 15px rgba(220, 38, 38, 0.6); }
        }
        .ticker-wrap {
            overflow: hidden;
            width: 100%;
            background-color: #020617;
            border-bottom: 2px solid #dc2626; /* PTI Red */
            border-top: 2px solid #16a34a; /* PTI Green */
            padding: 8px 0;
            display: flex;
            animation: heartbeat 2.5s infinite ease-in-out;
            z-index: 90;
        }
        .ticker {
            display: flex;
            white-space: nowrap;
            animation: marquee 22s linear infinite; /* Perfect moderate speed */
        }
        .ticker span {
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 3px;
            color: #facc15;
            padding-right: 40px;
        }

        .hero {
            padding: 80px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: #f8fafc;
        }
        
        .motto-box {
            background-color: rgba(15, 23, 42, 0.75);
            border-left: 4px solid #16a34a;
            border-right: 4px solid #dc2626;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin: 25px auto;
            max-width: 550px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        .motto-arabic {
            font-size: 2.3rem;
            font-weight: bold;
            font-family: 'Amiri', 'Georgia', serif;
            background: linear-gradient(to right, #22c55e, #facc15, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .motto-translation {
            color: #cbd5e1;
            font-size: 0.95rem;
            font-style: italic;
        }

        .hero p.description {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 30px;
            direction: rtl;
            text-align: center;
            line-height: 1.8;
        }
        .btn {
            background-color: #eab308;
            color: #0f172a;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
