            min-height: 100vh;

        }
        .navbar {
            background-color: #061a0c;
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-bottom: 2px solid #dc2626;
        }
        .nav-container {
            max-width: 1000px;
            margin: 0 auto;

        }
        .logo {

        .nav-links a {
            color: #cbd5e1;

            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #facc15;
        }
        
        .custom-translate select {
            background-color: #0f172a;
            color: #facc15;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            font-weight: bold;
        }

        /* Seamless Continuous Glowing Heartbeat Ticker Bar Styling */
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        @keyframes heartbeat {
            0%, 100% { box-shadow: 0 0 5px rgba(22, 163, 74, 0.3), 0 0 5px rgba(220, 38, 38, 0.3); }
            50% { box-shadow: 0 0 15px rgba(22, 163, 74, 0.6), 0 0 15px rgba(220, 38, 38, 0.6); }
        }
        .ticker-wrap {
            overflow: hidden;
            width: 100%;
            background-color: #020617;
            border-bottom: 2px solid #dc2626;
            border-top: 2px solid #16a34a;
            padding: 8px 0;
            display: flex;
            animation: heartbeat 2.5s infinite ease-in-out;
            z-index: 90;
        }
        .ticker {
            display: flex;
            white-space: nowrap;
            animation: marquee 35s linear infinite;
        }
        .ticker span {
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 3px;
            color: #facc15;
            padding-right: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            flex-grow: 1;
        }
        .section-title {
            font-size: 1.85rem; /* Slightly smaller & more modern */
            color: #facc15;
            border-bottom: 2px solid #eab308;
            padding-bottom: 8px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            background-color: rgba(255, 255, 255, 0.05);
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slide.active {
            opacity: 1;
        }

        }

            font-size: 1.15rem; /* Sleeker, elegant headings */
            margin-top: 22px;
            margin-bottom: 8px;
            border-right: 3px solid #facc15; /* Elegant side border */
            padding-right: 10px;
            font-weight: 700;
        }
        .urdu-text p {
            margin-bottom: 15px;
            line-height: 1.75;
            color: #cbd5e1;
            text-align: justify;
        }
        .urdu-text ul {
            margin-right: 20px;
            margin-bottom: 20px;
            list-style-type: square;
            color: #facc15;
        }

            margin-bottom: 8px;
            font-size: 0.98rem;
        }
        .urdu-text ul li span {
            color: #cbd5e1;
        }
